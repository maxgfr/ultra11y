<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>Accueil — Mon site accessible</title>
  </head>
  <body>
    <a href="#main" class="skip-link">Aller au contenu principal</a>
    <header>
      <nav aria-label="Navigation principale">
        <ul>
          <li><a href="/">Accueil</a></li>
          <li><a href="/contact">Contact</a></li>
        </ul>
      </nav>
    </header>
    <main id="main">
      <h1>Bienvenue</h1>
      <h2>Nos articles</h2>
      <img src="chat.png" alt="Un chat roux endormi sur un canapé" />

        <label for="q">Rechercher sur le site</label>
        <input id="q" type="search" />
        <button type="submit">Rechercher</button>
      </form>
      <table>
        <caption>Tarifs des offres</caption>
        <tr>
          <th scope="col">Offre</th>
          <th scope="col">Prix</th>
        </tr>
        <tr>
          <td>Base</td>

        </tr>
      </table>

    <footer>
      <p>© 2026 Mon site</p>
    </footer>

</html>
