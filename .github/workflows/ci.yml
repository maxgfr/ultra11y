name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 22 is the floor (engines.node >=22.18, what @babel/parser 8 requires);
        # 24 is current. The published bundle's Node 22 floor is covered by runtime-node-floor.
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Build is reproducible (committed bundles up to date)
        run: pnpm run check:build # tsup && copy-bundle && git diff --exit-code over both bundles

      - name: Test (with coverage)
        run: pnpm run test:coverage

      - name: Smoke-run the committed bundle (offline, fixture)
        run: pnpm run demo # audit -> report -> check -> criteria

      - name: Assert a report was produced
        run: ls /tmp/ultra11y-demo/rgaa-*.md

  install-bundle:
    runs-on: ubuntu-latest
    name: install-bundle (skill installs whole, not just SKILL.md)
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build the embedded bundle
        run: pnpm run build

      - name: Verify the install-bundle shape (no root SKILL.md, engine in sync)
        run: pnpm run verify:bundle

      - name: End-to-end — `skills add` bundles the engine + references, not SKILL.md alone
        run: |
          WORK="$(mktemp -d)"
          cd "$WORK"
          npx --yes skills add "$GITHUB_WORKSPACE" --skill ultra11y --agent claude-code --copy -y
          DIR=.claude/skills/ultra11y
          test -f "$DIR/SKILL.md"             || { echo "::error::SKILL.md not installed"; exit 1; }
          test -f "$DIR/scripts/ultra11y.mjs" || { echo "::error::engine not bundled — skills add dropped scripts/"; exit 1; }
          test -d "$DIR/references"           || { echo "::error::references/ not bundled"; exit 1; }
          node "$DIR/scripts/ultra11y.mjs" --help > /dev/null || { echo "::error::installed engine does not run"; exit 1; }
          echo "install-bundle: skill installed whole and the engine runs."

  # The shipped scripts/ultra11y.mjs is an install-free bundle declaring
  # engines.node ">=22.18" (the floor @babel/parser 8 requires). This job runs ONLY
  # the committed bundle on that floor, with no install, to guarantee the published
  # ">=22.18" promise actually holds.
  runtime-node-floor:
    runs-on: ubuntu-latest
    name: runtime (Node 22 floor, install-free bundle)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Audit / report / check / criteria on the floor Node
        run: |
          node scripts/ultra11y.mjs audit tests/fixtures/non-conforming/bad.html --out "$RUNNER_TEMP/u" --json > /dev/null
          node scripts/ultra11y.mjs report --in "$RUNNER_TEMP/u/audit-latest.json" --out "$RUNNER_TEMP/u"
          node scripts/ultra11y.mjs check --report "$RUNNER_TEMP"/u/rgaa-*.md
          node scripts/ultra11y.mjs criteria --theme 1 | grep -q "1.1"

      - name: JSX/TSX real-AST + cross-file audit runs on the floor (bundled @babel/parser)
        run: |
          node scripts/ultra11y.mjs audit "tests/fixtures/cross-file" --graph --dedup off --json > "$RUNNER_TEMP/jsx.json"
          node -e 'const a=require(process.env.RUNNER_TEMP+"/jsx.json"); if(!a.findings.some(f=>f.ruleId==="cross-icon-only-unnamed")){console.error("::error::JSX cross-file audit produced no finding on the floor Node");process.exit(1)}'

      - name: The check gate blocks an invented criterion (exit 1)
        run: |
          printf '## 1.\n## 2.\n- **99.9 — faux** — `x:1` (`d`)\n## 3.\n## 4.\n## 5.\n50%%\n' > "$RUNNER_TEMP/bad.md"
          if node scripts/ultra11y.mjs check --report "$RUNNER_TEMP/bad.md"; then
            echo "expected non-zero exit for an invented criterion"; exit 1
          fi
