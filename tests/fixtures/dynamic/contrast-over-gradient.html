<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Contrast over a gradient — statically undecidable</title>
  </head>
  <body>
    <main>
      <h1>Dynamic-only contrast</h1>
      <!-- Text painted over a CSS gradient: the static engine cannot compute the
           contrast against non-literal painted pixels, so it must leave 1.4.3 as a
           residual (manual) risk. axe-core, rendering the page, measures the real
           contrast and flags it — the delta the dynamic tier exists to add. -->
      <p style="color: #9a9a9a; background: linear-gradient(90deg, #ffffff, #f2f2f2)">
        Light grey text over a near-white gradient — insufficient contrast when painted.
      </p>
      <a href="/">Home</a>
    </main>
  </body>
</html>
