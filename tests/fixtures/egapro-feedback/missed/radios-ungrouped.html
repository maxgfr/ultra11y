<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>CSE</title>
  </head>
  <body>
    <main>
      <h1>Avis du CSE</h1>
      <form>
        <div>
          <label for="cse-oui">Oui</label>
          <input id="cse-oui" type="radio" name="cse" value="oui" />
          <label for="cse-non">Non</label>
          <input id="cse-non" type="radio" name="cse" value="non" />
          <label for="cse-na">Non applicable</label>
          <input id="cse-na" type="radio" name="cse" value="na" />
        </div>
      </form>
    </main>
  </body>
</html>
